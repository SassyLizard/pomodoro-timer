<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pomodoro Timer</title>
    <link rel="stylesheet" href="/src/style.css">
</head>
<body>
    <div id="app">
        <main class="timer" role="timer" aria-live="polite">
            <p class="timer__mode" id="timer-mode" aria-label="Current mode">Work</p>
            <p class="timer__display" id="timer-display" aria-label="Time remaining">25:00</p>
            <div class="timer__controls">
                <button type="button" class="timer__btn timer__btn--primary" id="timer-start-pause" aria-label="Start timer">Start</button>
                <button type="button" class="timer__btn timer__btn--secondary" id="timer-reset" aria-label="Reset timer">Reset</button>
            </div>
        </main>
    </div>
    <script type="module" src="/src/main.js"></script>
</body>
</html>
